name: Integration

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Debug with tmate set "debug_enabled"'
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  containers:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        runtime: [docker, containerd, incus]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.25.9"

      - name: Install CLI deps
        run: |
          brew install kubectl docker coreutils lima
          if [ "${{ matrix.runtime }}" = "incus" ]; then brew install incus; fi

      - name: Build and Install
        run: make && sudo make install

      - name: tmate debugging session
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3.23
        with:
          limit-access-to-actor: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled }}

      - name: Start Anvil
        run: anvil start --runtime ${{ matrix.runtime }}

      - name: Wait and Validate
        run: |
          case "${{ matrix.runtime }}" in
            docker)
              for i in {1..30}; do docker info && break; sleep 2; done
              docker ps && docker info
              ;;
            containerd)
              for i in {1..30}; do anvil nerdctl info && break; sleep 2; done
              anvil nerdctl ps && anvil nerdctl info
              ;;
            incus)
              for i in {1..30}; do incus version && break; sleep 2; done
              incus version && incus list
              ;;
          esac

      - name: Validate DNS
        run: anvil ssh default -- sh -c "sudo apt-get update -y -qq && sudo apt-get install -qq dnsutils && nslookup host.docker.internal"

      - name: Build and Run Images
        if: matrix.runtime != 'incus'
        run: |
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            docker build integration
            docker run --rm --platform=linux/arm64 ghcr.io/linuxcontainers/alpine:latest uname -a
            docker run --rm --platform=linux/amd64 ghcr.io/linuxcontainers/alpine:latest uname -a
          else
            anvil nerdctl -- build integration
            anvil nerdctl -- run --rm --platform=linux/arm64 ghcr.io/linuxcontainers/alpine:latest uname -a
            anvil nerdctl -- run --rm --platform=linux/amd64 ghcr.io/linuxcontainers/alpine:latest uname -a
          fi

      - name: Stop and Restart
        if: matrix.runtime != 'incus'
        run: |
          anvil stop
          anvil delete -f
          anvil start --runtime ${{ matrix.runtime }}

      - name: Wait after Restart
        if: matrix.runtime != 'incus'
        run: |
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            for i in {1..30}; do docker info && break; sleep 2; done
          else
            for i in {1..30}; do anvil nerdctl info && break; sleep 2; done
          fi

      - name: Assert Runtime Disk
        if: matrix.runtime != 'incus'
        run: |
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            docker run --pull=never --rm --platform=linux/arm64 ghcr.io/linuxcontainers/alpine:latest uname -a
            docker run --pull=never --rm --platform=linux/amd64 ghcr.io/linuxcontainers/alpine:latest uname -a
          else
            anvil nerdctl -- run --pull=never --rm --platform=linux/arm64 ghcr.io/linuxcontainers/alpine:latest uname -a
            anvil nerdctl -- run --pull=never --rm --platform=linux/amd64 ghcr.io/linuxcontainers/alpine:latest uname -a
          fi

      - name: Teardown
        run: anvil delete --data -f

  kubernetes:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        runtime: [docker, containerd]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.25.9"

      - name: Install CLI deps
        run: brew install kubectl docker coreutils lima

      - name: Build and Install
        run: make && sudo make install

      - name: tmate debugging session
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3.23
        with:
          limit-access-to-actor: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled }}

      - name: Start Anvil
        run: anvil start --runtime ${{ matrix.runtime }} --kubernetes-enabled

      - name: Wait for Kubernetes
        run: |
          for i in {1..30}; do
            kubectl cluster-info && break
            sleep 2
          done

      - name: Validate Kubernetes
        run: kubectl cluster-info && kubectl version && kubectl get nodes -o wide

      - name: Teardown
        run: anvil delete -f
